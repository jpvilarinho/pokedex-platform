name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pokedex
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pokedex"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pokedex

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend (dev deps)
        working-directory: backend
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint (ruff)
        working-directory: backend
        run: |
          ruff check .

      - name: Run migrations (alembic)
        working-directory: backend
        run: |
          alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pokedex-backend ./backend

      - name: Build frontend image
        run: docker build -t pokedex-frontend ./frontend